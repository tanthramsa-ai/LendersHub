# LendersHub - Redis (standalone)
# Run:   docker compose -f docker-compose.redis.yml up -d --build
# Needs: the shared external network (svc.cmd creates it, or:
#        docker network create lendershub-net)
name: lendershub-redis

services:
  redis:
    build:
      context: ./docker
      dockerfile: Dockerfile.redis
    image: lendershub-redis:latest
    container_name: lendershub-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    networks:
      lendershub-net:
        aliases: [redis]       # backend reaches Redis at host "redis"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  lendershub-net:
    external: true

volumes:
  redis_data:
